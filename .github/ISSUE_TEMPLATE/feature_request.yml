name: Feature request
description: Propose a focused improvement to the proofgrade product surface.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Keep proposals aligned with the narrow proof-grading scope.
    validations:
      required: true

